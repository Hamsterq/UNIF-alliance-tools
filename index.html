<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DW Survival - Alliance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; }
        .glass-card {
            background: rgba(23, 32, 51, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease;
        }
        .glass-card:hover { transform: translateY(-5px); border-color: rgba(251, 191, 36, 0.3); }
        .tier-badge {
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h1 class="text-4xl font-black text-amber-500 tracking-tighter uppercase italic">Alliance Tracker</h1>
                <p class="text-slate-500 font-medium">Dark War: Survival Division</p>
            </div>
            <div class="text-right">
                <span class="text-xs text-slate-500 uppercase block">Last Update</span>
                <span class="text-sm font-bold text-slate-300">April 2026</span>
            </div>
        </div>

        <div id="memberList" class="grid grid-cols-1 gap-6">
            </div>
    </div>

    <script>
        // DATA MEMBER DARK WAR: SURVIVAL
        // Silakan edit bagian ini untuk merubah data member kamu
        const membersData = [
            {
                rank: 1,
                name: "Vortex_Leader",
                th: "30",
                tier: "i3",
                power: "85.4M",
                growth: "+1.2M",
                kp: "250.5M",
                dead: "450.2K",
                dkp: "254.8M",
                status: "MVP"
            },
            {
                rank: 2,
                name: "Shadow_Hunter",
                th: "28",
                tier: "i2",
                power: "62.1M",
                growth: "+800K",
                kp: "180.2M",
                dead: "310.5K",
                dkp: "183.3M",
                status: "General"
            },
            {
                rank: 3,
                name: "Iron_Shield",
                th: "25",
                tier: "T10",
                power: "45.8M",
                growth: "-2.1M", // Power turun karena pasukan banyak yang mati
                kp: "95.4M",
                dead: "520.0K",
                dkp: "100.6M",
                status: "Fighter"
            }
        ];

        function render() {
            const container = document.getElementById('memberList');
            container.innerHTML = membersData.map(m => `
                <div class="glass-card rounded-2xl overflow-hidden shadow-2xl">
                    <div class="p-6">
                        <div class="flex items-center justify-between mb-6">
                            <div class="flex items-center gap-4">
                                <span class="text-4xl font-black text-slate-800/50 italic">#0${m.rank}</span>
                                <div>
                                    <h3 class="text-xl font-bold text-white tracking-tight">${m.name}</h3>
                                    <div class="flex gap-2 mt-1">
                                        <span class="bg-blue-900/40 text-blue-400 border border-blue-800 tier-badge">TH ${m.th}</span>
                                        <span class="bg-purple-900/40 text-purple-400 border border-purple-800 tier-badge">${m.tier}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="bg-amber-500/10 text-amber-500 border border-amber-500/20 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">${m.status}</span>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                                <span class="text-[10px] uppercase font-bold text-slate-500 block mb-1">Power</span>
                                <div class="text-xl font-bold">${m.power}</div>
                                <span class="text-xs ${m.growth.includes('+') ? 'text-green-500' : 'text-red-500'} font-bold">${m.growth}</span>
                            </div>
                            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                                <span class="text-[10px] uppercase font-bold text-slate-500 block mb-1">Kill Points</span>
                                <div class="text-xl font-bold text-slate-100">${m.kp}</div>
                            </div>
                            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                                <span class="text-[10px] uppercase font-bold text-slate-500 block mb-1">Dead Units</span>
                                <div class="text-xl font-bold text-red-500">${m.dead}</div>
                            </div>
                            <div class="bg-amber-500/5 p-4 rounded-xl border border-amber-500/20">
                                <span class="text-[10px] uppercase font-bold text-amber-500/80 block mb-1">DKP Score</span>
                                <div class="text-2xl font-black text-amber-400">${m.dkp}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        render();
    </script>
</body>
</html>
