<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DW Survival - Admin Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b101a; color: #e2e8f0; font-family: sans-serif; }
        .glass-card {
            background: rgba(23, 32, 51, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        input, select {
            background: #1a2233;
            border: 1px solid #334155;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
        }
        input:focus { border-color: #f59e0b; }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black text-amber-500 uppercase italic tracking-tighter">Alliance Command Center</h1>
            <button onclick="toggleAdmin()" class="bg-amber-600 hover:bg-amber-500 text-white text-xs font-bold py-2 px-4 rounded-lg transition">
                TOGGLE ADMIN INPUT
            </button>
        </div>

        <div id="adminForm" class="hidden glass-card rounded-2xl p-6 mb-10 border-amber-500/30 border-2">
            <h2 class="text-amber-500 font-bold mb-4 uppercase text-sm">Input Member Baru / Update Statistik</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <input type="text" id="inName" placeholder="Nama Member">
                <input type="number" id="inTH" placeholder="Level TH">
                <select id="inTier">
                    <option value="T9">T9</option>
                    <option value="T10">T10</option>
                    <option value="i1">i1</option>
                    <option value="i2">i2</option>
                    <option value="i3">i3</option>
                </select>
                <input type="text" id="inPower" placeholder="Power (misal: 50M)">
                <input type="number" id="inKP" placeholder="Kill Points">
                <input type="number" id="inDead" placeholder="Dead Units">
                <select id="inStatus">
                    <option value="Fighter">Fighter</option>
                    <option value="General">General</option>
                    <option value="MVP">MVP</option>
                </select>
                <button onclick="addMember()" class="bg-green-600 hover:bg-green-500 text-white font-bold rounded-lg">SIMPAN DATA</button>
            </div>
        </div>

        <div id="memberList" class="grid grid-cols-1 gap-4">
            </div>
    </div>

    <script>
        // Mengambil data dari LocalStorage atau pakai default jika kosong
        let membersData = JSON.parse(localStorage.getItem('dw_members')) || [
            { rank: 1, name: "Contoh_Member", th: "30", tier: "i3", power: "100M", kp: 50000000, dead: 100000, dkp: 60000000, status: "MVP" }
        ];

        function toggleAdmin() {
            document.getElementById('adminForm').classList.toggle('hidden');
        }

        function calculateDKP(kp, dead, tier) {
            let multiplier = (tier.startsWith('i')) ? 20 : 10;
            return parseInt(kp) + (parseInt(dead) * multiplier);
        }

        function addMember() {
            const name = document.getElementById('inName').value;
            const th = document.getElementById('inTH').value;
            const tier = document.getElementById('inTier').value;
            const power = document.getElementById('inPower').value;
            const kp = document.getElementById('inKP').value;
            const dead = document.getElementById('inDead').value;
            const status = document.getElementById('inStatus').value;

            if(!name || !kp || !dead) return alert("Isi nama, KP, dan Dead!");

            const newMember = {
                rank: membersData.length + 1,
                name: name,
                th: th,
                tier: tier,
                power: power,
                kp: parseInt(kp).toLocaleString(),
                dead: parseInt(dead).toLocaleString(),
                dkp: calculateDKP(kp, dead, tier).toLocaleString(),
                status: status
            };

            membersData.push(newMember);
            saveAndRender();
            
            // Clear input
            document.getElementById('inName').value = "";
        }

        function deleteMember(index) {
            if(confirm("Hapus member ini?")) {
                membersData.splice(index, 1);
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('dw_members', JSON.stringify(membersData));
            render();
        }

        function render() {
            const container = document.getElementById('memberList');
            container.innerHTML = membersData.map((m, index) => `
                <div class="glass-card rounded-xl p-5 flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <span class="text-2xl font-black text-slate-700">#${index + 1}</span>
                        <div>
                            <h3 class="font-bold text-white text-lg">${m.name}</h3>
                            <div class="flex gap-2">
                                <span class="text-[10px] bg-blue-900/50 text-blue-300 px-2 rounded border border-blue-700">TH ${m.th}</span>
                                <span class="text-[10px] bg-purple-900/50 text-purple-300 px-2 rounded border border-purple-700">${m.tier}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-6 text-center w-full md:w-auto">
                        <div><p class="text-[10px] text-slate-500 uppercase">KP</p><p class="font-bold">${m.kp}</p></div>
                        <div><p class="text-[10px] text-slate-500 uppercase">Dead</p><p class="font-bold text-red-400">${m.dead}</p></div>
                        <div><p class="text-[10px] text-amber-500 uppercase font-bold">DKP</p><p class="font-bold text-amber-400 text-lg">${m.dkp}</p></div>
                    </div>

                    <div class="flex gap-2 w-full md:w-auto justify-end">
                        <span class="text-[10px] font-bold border border-amber-500/50 text-amber-500 px-3 py-1 rounded-full uppercase">${m.status}</span>
                        <button onclick="deleteMember(${index})" class="text-xs text-red-500 hover:text-red-400 ml-4">✕</button>
                    </div>
                </div>
            `).join('');
        }

        render();
    </script>
</body>
</html>
