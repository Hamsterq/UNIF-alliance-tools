<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DW Survival - Tactic Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        cyber: { bg: '#060a12', card: '#101624', amber: '#f59e0b', cyan: '#22d3ee', rose: '#f43f5e' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: var(--color-cyber-bg); color: #e2e8f0; -webkit-font-smoothing: antialiased; }
        /* Efek Latar Belakang Hidup (Grid Heksagon) */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PGcgZmlsbC1ydWxlPSJldmVub2RkIj48ZyBmaWxsPSIjMWYyOTM3IiBmaWxsLW9wYWNpdHk9IjAuMDgiPjxwYXRoIGQ9Ik0wIGgyMHYyMEgwVjB6bTcgM2g2djZoLTZWNHptMCA5aDZ2NmgtNnYtNnptOS02aDR2NGgtNHYtNHptMCA5aDR2NGgtNHYtNHptLTctNmg0djRoLTR2LTR6bTAtOWg0djRoLTR2LTR6bTgtNmgydjJoLTJWOHpMOSAwSDB2MTJoMTBWMHptMCAxMGgydjJoLTJ2LTJ6bTktMTBoMXYxaC0xVjB6bTAtOWgydjJoLTJ2LTJ6bS0xNSA5aDF2MWgtMVY4em0wIDloMXYxaC0xdi0wek05IDE4aDF2MWgtMVYxOHptOC04aDF2MWgtMXYtMnpNOSAwSDB2MTJoMTBWMHptMCAxMGgydjJoLTJ2LTJ6bS05IDloMXYxaC0xdi0yek0xOCAxMGgxdjFoLTF2LTJ6bS0xOCA5aDF2MWgtMVYxOHptOS04aDF2MWgtMVYxMHptOS04aDF2MWgtMVY4em0tOS04aDF2MWgtMVYwek0xMCA4aDF2MWgtMVY4em0tOCA5aDF2MWgtMVYxOHpNOSAwSDB2MTJoMTBWMHptMCAxMGgydjJoLTJ2LTJ6bS05IDloMXYxaC0xdi0yeiIvPjwvZz48L2c+PC9zdmc+');
            opacity: 0.15; z-index: -1;
        }
        .glass-card {
            background: rgba(16, 22, 36, 0.85); backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.7);
        }
        .glow-amber { box-shadow: 0 0 15px -3px rgba(245, 158, 11, 0.4); }
        .glow-cyan { box-shadow: 0 0 15px -3px rgba(34, 211, 238, 0.4); }
        input, select { background: #0b101a; border: 1px solid #1f2937; color: white; padding: 12px; border-radius: 10px; font-size: 14px; transition: border 0.3s; }
        input:focus { border-color: var(--color-cyber-amber); outline: none; }
        .stat-box { background: rgba(6, 10, 18, 0.6); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 12px; padding: 14px; text-align: center; }
        .growth-icon { font-size: 10px; margin-right: 3px; }
    </style>
</head>
<body class="py-12 px-6">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6 p-6 glass-card rounded-2xl glow-cyan border-cyber-cyan/20">
            <div>
                <h1 class="text-5xl font-black text-amber-500 uppercase italic tracking-tighter leading-none">Tactic Command</h1>
                <p class="text-slate-500 text-sm mt-1">Alliance Member Development Interface (v2.0)</p>
            </div>
            <button onclick="toggleAdmin()" class="bg-amber-500 hover:bg-amber-400 text-slate-950 font-black py-3 px-8 rounded-full transition transform hover:scale-105 shadow-lg flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" /></svg>
                UPDATE DATABASE
            </button>
        </div>

        <div id="adminForm" class="hidden glass-card rounded-2xl p-8 mb-12 border-amber-500/50 border-2 glow-amber transition-all duration-300 transform scale-95 opacity-0">
            <h2 class="text-lg font-bold text-amber-500 mb-6 uppercase flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" /></svg> Input Member Data</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                <input type="text" id="inName" placeholder="Nama Member">
                <input type="text" id="inID" placeholder="ID Akun (cth: 12345)">
                <select id="inRank">
                    <option value="R5">Rank 5</option><option value="R4">Rank 4</option>
                    <option value="R3">Rank 3</option><option value="R2">Rank 2</option><option value="R1">Rank 1</option>
                </select>
                <select id="inTH">
                    <optgroup label="Town Hall">
                        <script>for(let i=1;i<=30;i++) document.write(`<option value="${i}">TH ${i}</option>`)</script>
                        <script>for(let i=1;i<=8;i++) document.write(`<option value="i${i}">TH i${i}</option>`)</script>
                    </optgroup>
                </select>
                <select id="inTier">
                    <optgroup label="Troop Tier">
                        <script>for(let i=1;i<=10;i++) document.write(`<option value="T${i}">Tier T${i}</option>`)</script>
                        <script>for(let i=1;i<=8;i++) document.write(`<option value="i${i}">Tier i${i}</option>`)</script>
                    </optgroup>
                </select>
                <input type="number" id="inPower" placeholder="Power Saat Ini">
                <input type="number" id="inKP" placeholder="Total Kill Points">
                <input type="number" id="inDead" placeholder="Total Pasukan Mati">
                <button onclick="processData()" class="bg-amber-500 hover:bg-amber-400 text-slate-950 font-black rounded-lg md:col-span-1 lg:col-span-4 py-3.5 transition transform hover:scale-102">EXECUTE UPDATE</button>
            </div>
        </div>

        <div id="memberContainer" class="space-y-6"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('dw_tactic_db')) || [];

        function toggleAdmin() { 
            const form = document.getElementById('adminForm');
            form.classList.toggle('hidden');
            // Sedikit trik JS untuk memicu animasi saat tombol toggle ditekan
            if(!form.classList.contains('hidden')) {
                setTimeout(() => { form.classList.remove('scale-95', 'opacity-0'); }, 10);
            } else {
                form.classList.add('scale-95', 'opacity-0');
            }
        }

        function formatID(id) { id = id.replace('#', ''); return '#' + id; }

        function processData() {
            const name = document.getElementById('inName').value.trim();
            const rawID = document.getElementById('inID').value.trim();
            const rank = document.getElementById('inRank').value;
            const th = document.getElementById('inTH').value;
            const tier = document.getElementById('inTier').value;
            const power = parseInt(document.getElementById('inPower').value) || 0;
            const kp = parseInt(document.getElementById('inKP').value) || 0;
            const dead = parseInt(document.getElementById('inDead').value) || 0;

            if (!name || !rawID) return alert("Nama dan ID wajib diisi!");

            const id = formatID(rawID);
            const index = db.findIndex(m => m.id === id);

            const dkp = kp + (dead * (tier.startsWith('i') ? 20 : 10));

            if (index !== -1) {
                let old = db[index];
                db[index] = { ...old, name, rank, th, tier, gPower: power - old.power, gKP: kp - old.kp, gDead: dead - old.dead, power, kp, dead, dkp };
            } else {
                db.push({ name, id, rank, th, tier, power, kp, dead, dkp, gPower:0, gKP:0, gDead:0 });
            }

            save();
            // Clear inputs
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        function save() { db.sort((a, b) => b.dkp - a.dkp); localStorage.setItem('dw_tactic_db', JSON.stringify(db)); render(); toggleAdmin(); }

        function n(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num;
        }

        function render() {
            const container = document.getElementById('memberContainer');
            container.innerHTML = db.map((m, i) => `
                <div class="glass-card rounded-2xl p-6 shadow-xl transition-all duration-300 transform hover:border-cyber-cyan hover:shadow-cyan-900/40 relative">
                    <div class="flex flex-col xl:flex-row justify-between items-center gap-6">
                        
                        <div class="flex items-center gap-6 w-full xl:w-1/3">
                            <div class="text-4xl font-black text-slate-700 italic border-l-4 border-cyber-cyan pl-4">#0${i+1}</div>
                            <div>
                                <div class="flex items-center gap-3">
                                    <h3 class="font-bold text-white text-2xl tracking-tight">${m.name}</h3>
                                    <span class="text-xs font-bold px-2.5 py-1 rounded bg-amber-500 text-slate-950 tracking-wider">${m.rank}</span>
                                </div>
                                <p class="text-sm text-slate-500 font-mono mt-0.5">${m.id}</p>
                                <div class="flex gap-2.5 mt-3">
                                    <span class="text-[10px] font-bold bg-blue-900/40 text-blue-300 px-3 py-1 rounded-full border border-blue-800/50 uppercase tracking-wider">TH ${m.th}</span>
                                    <span class="text-[10px] font-bold bg-purple-900/40 text-purple-300 px-3 py-1 rounded-full border border-purple-800/50 uppercase tracking-wider">${m.tier}</span>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-5 w-full xl:w-2/3">
                            <div class="stat-box">
                                <p class="text-[10px] uppercase text-slate-600 font-black mb-1.5 tracking-widest flex items-center justify-center gap-1.5"><svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>Power</p>
                                <p class="text-2xl font-black">${n(m.power)}</p>
                                <p class="text-[10px] font-bold ${m.gPower >= 0 ? 'text-green-400' : 'text-rose-500'}">
                                    ${m.gPower >= 0 ? '<span class="growth-icon">▲</span>' : '<span class="growth-icon">▼</span>'}${n(Math.abs(m.gPower))}
                                </p>
                            </div>
                            <div class="stat-box border-rose-900/50">
                                <p class="text-[10px] uppercase text-slate-600 font-black mb-1.5 tracking-widest flex items-center justify-center gap-1.5"><svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>Dead</p>
                                <p class="text-2xl font-black text-rose-500">${n(m.dead)}</p>
                                <p class="text-[10px] font-bold ${m.gDead >= 0 ? 'text-rose-600' : 'text-green-500'}">
                                    ${m.gDead >= 0 ? '<span class="growth-icon">▲</span>' : '<span class="growth-icon">▼</span>'}${n(Math.abs(m.gDead))}
                                </p>
                            </div>
                            <div class="stat-box border-amber-500/30 bg-amber-500/5">
                                <p class="text-[10px] uppercase text-amber-600 font-black mb-1.5 tracking-widest flex items-center justify-center gap-1.5"><svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>DKP Score</p>
                                <p class="text-3xl font-black text-amber-500 glow-amber">${n(m.dkp)}</p>
                                <p class="text-[10px] font-bold text-amber-500/50 tracking-wider">Tactical Efficiency</p>
                            </div>
                        </div>

                        <button onclick="remove(${i})" class="absolute top-4 right-4 text-slate-800 hover:text-rose-500 transition-colors duration-200">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" /></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function remove(i) { if(confirm("Hapus member ini dari Tactic Command?")) { db.splice(i, 1); save_no_toggle(); } }
        function save_no_toggle() { db.sort((a, b) => b.dkp - a.dkp); localStorage.setItem('dw_tactic_db', JSON.stringify(db)); render(); }
        render();
    </script>
</body>
</html>
