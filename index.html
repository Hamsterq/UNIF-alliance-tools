<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DW Survival - Smart Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b101a; color: #e2e8f0; font-family: sans-serif; }
        .glass-card { background: rgba(23, 32, 51, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input, select { background: #1a2233; border: 1px solid #334155; color: white; padding: 8px; border-radius: 6px; width: 100%; }
        .up { color: #10b981; } /* Hijau */
        .down { color: #ef4444; } /* Merah */
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black text-amber-500 uppercase italic">Smart Alliance Tracker</h1>
            <button onclick="toggleAdmin()" class="bg-amber-600 text-white text-xs font-bold py-2 px-4 rounded-lg">ADMIN INPUT</button>
        </div>

        <div id="adminForm" class="hidden glass-card rounded-2xl p-6 mb-10 border-amber-500/30 border-2">
            <p class="text-xs text-slate-400 mb-4">*Jika nama sudah ada, data akan diperbarui & dihitung perkembangannya.</p>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <input type="text" id="inName" placeholder="Nama Member">
                <input type="number" id="inPower" placeholder="Power Saat Ini">
                <input type="number" id="inKP" placeholder="Total KP">
                <input type="number" id="inDead" placeholder="Total Dead">
                <select id="inTier">
                    <option value="T10">T10</option>
                    <option value="i1">i1</option>
                    <option value="i2">i2</option>
                    <option value="i3">i3</option>
                </select>
                <button onclick="updateMember()" class="bg-green-600 font-bold rounded-lg col-span-2">UPDATE / SIMPAN</button>
            </div>
        </div>

        <div id="memberList" class="space-y-4"></div>
    </div>

    <script>
        let membersData = JSON.parse(localStorage.getItem('dw_smart_tracker')) || [];

        function toggleAdmin() { document.getElementById('adminForm').classList.toggle('hidden'); }

        function updateMember() {
            const name = document.getElementById('inName').value.trim();
            const power = parseInt(document.getElementById('inPower').value) || 0;
            const kp = parseInt(document.getElementById('inKP').value) || 0;
            const dead = parseInt(document.getElementById('inDead').value) || 0;
            const tier = document.getElementById('inTier').value;

            if (!name) return alert("Masukkan Nama!");

            // Cari apakah member sudah ada
            const index = membersData.findIndex(m => m.name.toLowerCase() === name.toLowerCase());

            if (index !== -1) {
                // LOGIKA GROWTH (Menghitung Selisih)
                let oldData = membersData[index];
                membersData[index] = {
                    ...oldData,
                    tier: tier,
                    // Hitung selisih untuk panah
                    growthPower: power - oldData.power,
                    growthKP: kp - oldData.kp,
                    growthDead: dead - oldData.dead,
                    // Update data terbaru
                    power: power,
                    kp: kp,
                    dead: dead,
                    dkp: kp + (dead * (tier.startsWith('i') ? 20 : 10))
                };
            } else {
                // Member Baru
                membersData.push({
                    name: name, power: power, kp: kp, dead: dead, tier: tier,
                    growthPower: 0, growthKP: 0, growthDead: 0,
                    dkp: kp + (dead * (tier.startsWith('i') ? 20 : 10))
                });
            }

            saveAndRender();
        }

        function saveAndRender() {
            // Sortir berdasarkan DKP tertinggi
            membersData.sort((a, b) => b.dkp - a.dkp);
            localStorage.setItem('dw_smart_tracker', JSON.stringify(membersData));
            render();
        }

        function formatVal(val) {
            if (val >= 1000000) return (val / 1000000).toFixed(1) + 'M';
            if (val >= 1000) return (val / 1000).toFixed(1) + 'K';
            return val;
        }

        function render() {
            const container = document.getElementById('memberList');
            container.innerHTML = membersData.map((m, i) => `
                <div class="glass-card rounded-xl p-5 shadow-xl border-l-4 ${m.growthPower >= 0 ? 'border-green-500' : 'border-red-500'}">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="flex items-center gap-4 w-full md:w-1/3">
                            <span class="text-2xl font-black text-slate-700">#${i + 1}</span>
                            <div>
                                <h3 class="font-bold text-white text-lg">${m.name}</h3>
                                <span class="text-[10px] bg-purple-900/50 text-purple-300 px-2 rounded border border-purple-800">${m.tier}</span>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-8 text-center w-full md:w-2/3">
                            <div>
                                <p class="text-[10px] text-slate-500 uppercase">Power</p>
                                <p class="font-bold">${formatVal(m.power)}</p>
                                <p class="text-[10px] font-bold ${m.growthPower >= 0 ? 'up' : 'down'}">
                                    ${m.growthPower >= 0 ? '▲' : '▼'} ${formatVal(Math.abs(m.growthPower))}
                                </p>
                            </div>
                            <div>
                                <p class="text-[10px] text-slate-500 uppercase">Dead</p>
                                <p class="font-bold">${formatVal(m.dead)}</p>
                                <p class="text-[10px] font-bold ${m.growthDead >= 0 ? 'up' : 'down'}">
                                    ${m.growthDead >= 0 ? '▲' : '▼'} ${formatVal(Math.abs(m.growthDead))}
                                </p>
                            </div>
                            <div>
                                <p class="text-[10px] text-amber-500 uppercase font-bold">DKP Score</p>
                                <p class="font-black text-amber-400 text-xl">${formatVal(m.dkp)}</p>
                            </div>
                        </div>
                        <button onclick="deleteMember(${i})" class="text-slate-700 hover:text-red-500 transition">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteMember(i) { if(confirm("Hapus?")) { membersData.splice(i,1); saveAndRender(); } }
        render();
    </script>
</body>
</html>
